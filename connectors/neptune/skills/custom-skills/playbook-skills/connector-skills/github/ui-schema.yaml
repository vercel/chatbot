name: GitHub
icon: git-branch
accentColor: "#24292F"
keyFields:
  - { field: repo, type: text }
  - { field: branch, type: text }
  - { field: prStatus, type: badge, colors: { open: emerald, merged: purple, closed: red } }
expandedLayout:
  - diffView
  - checks
functions:
  - create_pr
  - read_file
  - list_dir
  - search_repo
  - get_pr_status
